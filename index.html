<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>s0uz4x engine</title>

<style>

/* ===== GLOW GAMER EFFECT ===== */

:root {
    --neon: #7c3cff;
    --neon-strong: #a855ff;
}

/* MENU HOVER GLOW */
.nav-center a:hover,
.mobile-nav a:hover {
    color: var(--neon-strong);
    text-shadow:
        0 0 5px var(--neon),
        0 0 10px var(--neon),
        0 0 20px var(--neon);
}

/* BOTÕES GLOW */
.btn {
    box-shadow: 0 0 10px rgba(124, 60, 255, 0.4);
}

.btn:hover {
    box-shadow:
        0 0 10px var(--neon),
        0 0 20px var(--neon),
        0 0 40px var(--neon);
    transform: translateY(-4px);
}

/* DISCORD GLOW */
.discord-btn {
    transition: 0.3s;
}

.discord-btn:hover {
    color: var(--neon-strong);
    text-shadow:
        0 0 8px var(--neon),
        0 0 16px var(--neon),
        0 0 30px var(--neon);
}

/* CARD GLOW */
.card:hover {
    box-shadow:
        0 0 15px rgba(124, 60, 255, 0.5),
        0 0 30px rgba(124, 60, 255, 0.3);
    border: 1px solid var(--neon);
}

/* LOGO GLOW */
.logo img {
    transition: 0.3s;
}

.logo img:hover {
    filter: drop-shadow(0 0 10px var(--neon))
            drop-shadow(0 0 20px var(--neon));
}

/* HEADER LIGHT LINE */
header {
    box-shadow: 0 0 15px rgba(124, 60, 255, 0.3);
}
    
/* RESET */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

html {
    scroll-behavior: smooth;
}

body {
    background-color: #0f0f14;
    color: #ffffff;
}

/* HEADER */
header {
    background: #15151d;
    padding: 15px 30px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 2px solid #4a1edb;
    position: sticky;
    top: 0;
    z-index: 1000;
}

/* LOGO */
.logo img {
    height: 50px;
}

/* MENU CENTRAL (PC) */
.nav-center {
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 30px;
}

.nav-center a {
    color: #ccc;
    text-decoration: none;
    font-weight: 500;
    cursor: pointer;
}

.nav-center a:hover {
    color: #4a1edb;
}

/* DISCORD DIREITA (PC) */
.discord-btn {
    color: #fff;
    text-decoration: none;
    font-size: 22px;
}

.discord-btn:hover {
    color: #4a1edb;
}

/* BOTÃO HAMBURGUER */
.menu-toggle {
    display: none;
    font-size: 28px;
    cursor: pointer;
    color: white;
}

/* MENU MOBILE */
.mobile-nav {
    display: none;
}

/* MOBILE */
@media (max-width: 768px) {

    .nav-center,
    .discord-btn {
        display: none;
    }

    .menu-toggle {
        display: block;
    }

    .mobile-nav {
        display: none;
        flex-direction: column;
        position: absolute;
        top: 70px;
        left: 0;
        width: 100%;
        background: #15151d;
        padding: 20px 0;
        text-align: center;
        border-top: 1px solid #222;
    }

    .mobile-nav.active {
        display: flex;
    }

    .mobile-nav a {
        color: #ccc;
        text-decoration: none;
        padding: 12px 0;
    }

    .mobile-nav a:hover {
        color: #4a1edb;
    }
}

/* HERO */
.hero {
    text-align: center;
    padding: 100px 40px;
}

.hero h2 {
    font-size: 60px;
    margin-bottom: 15px;
}

.hero p {
    color: #aaa;
}

/* SECTIONS */
.section {
    padding: 60px 40px;
    max-width: 1000px;
    margin: auto;
}

.section h3 {
    margin-bottom: 30px;
    border-left: 4px solid #4a1edb;
    padding-left: 10px;
}

/* CARDS */
.cards {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 25px;
}

.card {
    background: #1a1a25;
    padding: 25px;
    border-radius: 12px;
    transition: 0.3s;
}

.card:hover {
    transform: translateY(-6px);
    box-shadow: 0 0 20px rgba(74, 30, 219, 0.4);
}

.card h4 {
    margin-bottom: 15px;
    color: #4a1edb;
}

.card p {
    font-size: 14px;
    color: #bbb;
    margin-bottom: 15px;
}

.btn {
    background: #4a1edb;
    color: white;
    padding: 10px 20px;
    border-radius: 6px;
    text-decoration: none;
    font-weight: bold;
    display: inline-block;
    transition: 0.3s;
}

.btn:hover {
    background: #3411a6;
}

/* FOOTER */
.footer {
    text-align: center;
    padding: 20px;
    background: #15151d;
    border-top: 1px solid #222;
    color: #888;
    font-size: 14px;
}

</style>
</head>

<body>

<header>

    <!-- LOGO -->
    <a href="#" class="logo">
        <img src="./logo.png" alt="logo">
    </a>

    <!-- MENU CENTRAL PC -->
    <nav class="nav-center">
        <a data-target="emuladores">Emuladores</a>
        <a data-target="jogos">V7A</a>
        <a data-target="config">Config</a>
        <a data-target="otimizacao">Otimização</a>
    </nav>

    <!-- DISCORD PC -->
    <a href="https://discord.gg/cEPJvemB" target="_blank" class="discord-btn">
        🎮
    </a>

    <!-- BOTÃO MOBILE -->
    <div class="menu-toggle" id="menuToggle">
        ☰
    </div>

    <!-- MENU MOBILE -->
    <nav id="mobileMenu" class="mobile-nav">
        <a data-target="emuladores">Emuladores</a>
        <a data-target="jogos">V7A</a>
        <a data-target="config">Config</a>
        <a data-target="otimizacao">Otimização</a>
        <a href="https://discord.gg/cEPJvemB" target="_blank">Discord</a>
    </nav>

</header>

<!-- RESTO DO SEU SITE CONTINUA IGUAL -->

<div class="footer">
    © 2026 s0uz4x engine - Todos os direitos reservados.
</div>

<script>
document.addEventListener("DOMContentLoaded", function () {

    const toggle = document.getElementById("menuToggle");
    const menu = document.getElementById("mobileMenu");
    const smoothLinks = document.querySelectorAll("[data-target]");

    // Toggle menu mobile
    toggle.addEventListener("click", function (event) {
        event.stopPropagation();
        menu.classList.toggle("active");
    });

    // Fechar clicando fora
    document.addEventListener("click", function (event) {
        if (!menu.contains(event.target) && !toggle.contains(event.target)) {
            menu.classList.remove("active");
        }
    });

    // Scroll suave sem mostrar #
    smoothLinks.forEach(link => {
        link.addEventListener("click", function () {

            const targetId = this.getAttribute("data-target");
            const section = document.getElementById(targetId);

            if (section) {
                section.scrollIntoView({
                    behavior: "smooth"
                });
            }

            menu.classList.remove("active");
        });
    });

});
</script>

</body>
</html>
